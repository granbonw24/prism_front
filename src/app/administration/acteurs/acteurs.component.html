<div class="container-fluid">
  <div class="d-sm-flex align-items-center justify-content-between mb-3">
    <h1 class="h4 mb-0 text-gray-800">Acteurs (gestion des rôles)</h1>
    <button class="btn btn-sm btn-outline-primary" (click)="reload()" [disabled]="loading || saving">
      <span *ngIf="loading">Chargement…</span>
      <span *ngIf="!loading">Rafraîchir</span>
    </button>
  </div>

  <div *ngIf="errorMessage" class="alert alert-danger py-2">
    {{ errorMessage }}
  </div>

  <div class="card border-0 shadow-sm mb-4">
    <div class="card-header py-3 bg-white border-bottom-0">
      <h6 class="m-0 font-weight-bold text-primary">Ajouter un rôle</h6>
    </div>
    <div class="card-body pt-2">
      <div class="form-row">
        <div class="form-group col-md-4">
          <label class="small text-muted" for="libelleRole">Libellé</label>
          <input
            id="libelleRole"
            class="form-control"
            [(ngModel)]="newRole.libelleRole"
            [disabled]="saving"
            placeholder="ex: Administrateur"
          />
        </div>
        <div class="form-group col-md-8">
          <label class="small text-muted" for="descriptionRole">Description (optionnel)</label>
          <input
            id="descriptionRole"
            class="form-control"
            [(ngModel)]="newRole.descriptionRole"
            [disabled]="saving"
            placeholder="Accès / périmètre…"
          />
        </div>
      </div>
      <button class="btn btn-primary" (click)="create()" [disabled]="!canCreate()">
        <span *ngIf="saving">Enregistrement…</span>
        <span *ngIf="!saving">Ajouter</span>
      </button>
    </div>
  </div>

  <div class="card border-0 shadow-sm">
    <div class="card-header py-3 bg-white border-bottom-0">
      <h6 class="m-0 font-weight-bold text-primary">Rôles existants</h6>
    </div>
    <div class="card-body pt-3">
      <div *ngIf="loading" class="small text-muted">Chargement des rôles…</div>
      <div *ngIf="!loading" class="table-responsive">
        <table class="table table-bordered align-middle">
          <thead class="thead-light">
            <tr>
              <th style="min-width: 120px">Code</th>
              <th style="min-width: 220px">Libellé</th>
              <th>Description</th>
              <th style="width: 110px" class="text-center">Actions</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let r of roles">
              <td class="font-weight-bold">
                {{ r.codeRole ?? '—' }}
              </td>
              <td>
                <span *ngIf="editingRoleId !== r.id">{{ r.libelleRole ?? '—' }}</span>
                <input
                  *ngIf="editingRoleId === r.id"
                  class="form-control form-control-sm"
                  [(ngModel)]="editRole!.libelleRole"
                  [disabled]="saving"
                />
              </td>
              <td class="text-muted">
                <span *ngIf="editingRoleId !== r.id">{{ r.descriptionRole ?? '—' }}</span>
                <input
                  *ngIf="editingRoleId === r.id"
                  class="form-control form-control-sm"
                  [(ngModel)]="editRole!.descriptionRole"
                  [disabled]="saving"
                />
              </td>
              <td class="text-center">
                <ng-container *ngIf="editingRoleId !== r.id; else editingActions">
                  <button
                    class="btn btn-sm btn-outline-secondary mr-1"
                    type="button"
                    (click)="startEdit(r)"
                    [disabled]="saving"
                    title="Modifier"
                    aria-label="Modifier"
                  >
                    <i class="fas fa-pen" aria-hidden="true"></i>
                  </button>
                  <button
                    class="btn btn-sm btn-outline-danger"
                    type="button"
                    (click)="deleteRole(r)"
                    [disabled]="saving"
                    title="Supprimer"
                    aria-label="Supprimer"
                  >
                    <i class="fas fa-trash" aria-hidden="true"></i>
                  </button>
                </ng-container>
                <ng-template #editingActions>
                  <button
                    class="btn btn-sm btn-primary mr-1"
                    (click)="saveEdit()"
                    [disabled]="!canSaveEdit()"
                  >
                    Enregistrer
                  </button>
                  <button
                    class="btn btn-sm btn-outline-secondary"
                    (click)="cancelEdit()"
                    [disabled]="saving"
                  >
                    Annuler
                  </button>
                </ng-template>
              </td>
            </tr>
            <tr *ngIf="roles.length === 0">
              <td colspan="4" class="text-center text-muted py-4">Aucun rôle.</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>
