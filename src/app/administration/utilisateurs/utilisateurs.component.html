<div class="container-fluid px-2 px-sm-3">
  <div class="card border-0 shadow-sm">
    <div class="card-header py-3 bg-white border-bottom-0">
      <h6 class="m-0 font-weight-bold text-primary">Administration — Utilisateurs</h6>
      <div class="small text-muted mt-1">
        Associer les rôles (acteur) aux comptes utilisateurs.
      </div>
    </div>

    <div class="card-body pt-3">
      <div *ngIf="loading" class="text-muted">Chargement…</div>
      <div *ngIf="!loading && errorMessage" class="alert alert-danger">
        {{ errorMessage }}
      </div>

      <div *ngIf="!loading && !errorMessage">
        <div class="table-responsive">
          <table class="table table-bordered align-middle">
            <thead class="thead-light">
              <tr>
                <th style="min-width: 220px;">Utilisateur</th>
                <th *ngFor="let r of roles" class="text-center">
                  {{ r.libelleRole ?? r.codeRole ?? r.id }}
                </th>
              </tr>
            </thead>
            <tbody>
              <tr *ngFor="let u of users">
                <td>
                  <div class="font-weight-bold">
                    {{ u.username }}
                  </div>
                  <div class="small text-muted" *ngIf="u.email">
                    {{ u.email }}
                  </div>
                  <div class="small text-muted">
                    Actif: {{ u.actif ? 'oui' : 'non' }}
                  </div>
                </td>
                <td *ngFor="let r of roles" class="text-center" style="white-space: nowrap;">
                  <input
                    type="checkbox"
                    class="form-check-input"
                    [checked]="isChecked(u, r.id)"
                    (change)="toggleRole(u, r.id, $event)"
                    [disabled]="saving"
                    aria-label="Toggle user role"
                  />
                </td>
              </tr>
            </tbody>
          </table>
        </div>

        <div *ngIf="saving" class="small text-muted">
          Mise à jour des rôles en cours…
        </div>
      </div>
    </div>
  </div>
</div>
