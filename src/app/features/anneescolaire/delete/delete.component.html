<div class="modal d-block mena-modal-backdrop" tabindex="-1" role="dialog" aria-modal="true">
  <div class="modal-dialog modal-dialog-centered" role="document">
    <div class="modal-content shadow">
      <div class="modal-header">
        <h5 class="modal-title">Supprimer l’année scolaire</h5>
        <button type="button" class="close" aria-label="Fermer" (click)="cancel()" [disabled]="deleting">
          <span aria-hidden="true">&times;</span>
        </button>
      </div>
      <div class="modal-body">
        <p class="mb-2">
          Confirmer la suppression de
          <strong>{{ annee.codeAnneeScolaire || 'année #' + annee.id }}</strong>
          ({{ annee.debutAnneeScolaire }} → {{ annee.finAnneeScolaire }}) ?
        </p>
        <div *ngIf="errorMessage" class="alert alert-danger py-2 mb-0 small">{{ errorMessage }}</div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" (click)="cancel()" [disabled]="deleting">Annuler</button>
        <button type="button" class="btn btn-danger" (click)="confirm()" [disabled]="deleting">
          {{ deleting ? 'Suppression…' : 'Supprimer' }}
        </button>
      </div>
    </div>
  </div>
</div>
