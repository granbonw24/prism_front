<div class="container-fluid">
  <h1 class="h3 mb-2 text-gray-800">Ministères</h1>
  <p class="mb-4">Données issues de l'API <code>/api/ministeres</code>.</p>

  <div *ngIf="loading" class="text-muted">Chargement…</div>
  <div *ngIf="errorMessage" class="alert alert-warning">{{ errorMessage }}</div>

  <div class="card shadow mb-4" *ngIf="!loading && !errorMessage">
    <div class="card-header py-3">
      <h6 class="m-0 font-weight-bold text-primary">Liste</h6>
    </div>
    <div class="card-body">
      <div class="table-responsive">
        <table class="table table-bordered" width="100%" cellspacing="0">
          <thead>
            <tr>
              <th>Id</th>
              <th>Libellé ministère</th>
              <th>Code promoteur</th>
              <th>Dénomination</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let m of ministeres">
              <td>{{ m.id }}</td>
              <td>{{ m.libelleMinistere ?? '—' }}</td>
              <td>{{ m.codePromoteur ?? '—' }}</td>
              <td>{{ m.denomination ?? '—' }}</td>
            </tr>
          </tbody>
        </table>
        <p *ngIf="ministeres.length === 0" class="text-muted mb-0">
          Aucun enregistrement.
        </p>
      </div>
    </div>
  </div>
</div>
